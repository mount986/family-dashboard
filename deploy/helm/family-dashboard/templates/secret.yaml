# If jwtSecret is empty the JWT will be insecure — set a real value via --set or existingSecret
{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "family-dashboard.fullname" . }}-secret
  labels:
    {{- include "family-dashboard.labels" . | nindent 4 }}
type: Opaque
data:
  jwt-secret: {{ .Values.secrets.jwtSecret | b64enc | quote }}
{{- end }}
