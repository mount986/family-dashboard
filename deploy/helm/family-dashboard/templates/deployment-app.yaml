apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "family-dashboard.fullname" . }}-api
  labels:
    {{- include "family-dashboard.labels" . | nindent 4 }}
spec:
  # SQLite is a single-writer database; more than one replica would cause
  # data corruption from concurrent writes to the same file on the PVC.
  replicas: 1
  selector:
    matchLabels:
      {{- include "family-dashboard.apiSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "family-dashboard.apiSelectorLabels" . | nindent 8 }}
        {{- include "family-dashboard.labels" . | nindent 8 }}
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.api.repository }}:{{ .Values.image.api.tag }}"
          imagePullPolicy: {{ .Values.image.api.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.app.apiPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "family-dashboard.fullname" . }}-config
          env:
            - name: NODE_ENV
              value: "production"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "family-dashboard.secretName" . }}
                  key: {{ include "family-dashboard.jwtSecretKey" . }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: {{ .Values.app.apiPort }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: {{ .Values.app.apiPort }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          resources:
            {{- toYaml .Values.resources.api | nindent 12 }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            # readOnlyRootFilesystem requires explicit writable mounts for any
            # paths Node.js writes to at runtime (tmp, data).
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: data
              mountPath: /data
            # Node.js needs a writable /tmp when readOnlyRootFilesystem is true.
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "family-dashboard.pvcName" . }}
        - name: tmp
          emptyDir: {}
