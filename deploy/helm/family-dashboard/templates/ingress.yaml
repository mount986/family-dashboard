apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "family-dashboard.fullname" . }}
  labels:
    {{- include "family-dashboard.labels" . | nindent 4 }}
  {{- if .Values.ingress.annotations }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tlsSecretName }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: {{ include "family-dashboard.fullname" . }}-api
                port:
                  number: 3001
          - path: /health
            pathType: Exact
            backend:
              service:
                name: {{ include "family-dashboard.fullname" . }}-api
                port:
                  number: 3001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "family-dashboard.fullname" . }}-web
                port:
                  number: 80
