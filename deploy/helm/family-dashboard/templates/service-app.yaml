apiVersion: v1
kind: Service
metadata:
  name: {{ include "family-dashboard.fullname" . }}-api
  labels:
    {{- include "family-dashboard.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 3001
      targetPort: 3001
      protocol: TCP
      name: http
  selector:
    {{- include "family-dashboard.apiSelectorLabels" . | nindent 4 }}
